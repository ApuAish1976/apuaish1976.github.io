<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cortex Test</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="background:#0f172a;color:white;text-align:center;padding:50px;font-family:sans-serif">
  <h1>Cortex Sandbox Test</h1>
  <button onclick="login()" style="padding:15px 30px;font-size:18px;background:#6366f1;border:none;border-radius:8px;color:white;margin:10px">1. Login</button>
  <button onclick="pay()" style="padding:15px 30px;font-size:18px;background:#10b981;border:none;border-radius:8px;color:white;margin:10px">2. Pay 0.1 Test</button>
  <div id="log" style="background:#1e293b;padding:20px;border-radius:8px;margin-top:20px;text-align:left">Ready to test...</div>

  <script>
    function onIncompletePaymentFound(payment) {
      addLog('Found incomplete payment: ' + payment.identifier);
      Pi.completePayment(payment.identifier);
    }

    Pi.init({ version: "2.0", sandbox: true });
    addLog('SDK Initialized. Sandbox: true');

    function addLog(text) {
      const logDiv = document.getElementById('log');
      logDiv.innerHTML += '<br>> ' + text;
    }

    async function login() {
      try {
        addLog('Button clicked. Starting auth...');
        const scopes = ['payments'];
        const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
        addLog('Login SUCCESS: ' + auth.user.username);
      } catch (error) {
        addLog('Login FAILED: ' + error.message);
      }
    }

    function pay() {
      addLog('Creating payment...');
      Pi.createPayment({
        amount: 0.1,
        memo: "Test Payment",
        metadata: { test: "1", orderId: Date.now() } // ← هذا التعديل المهم
      }, {
        onReadyForServerApproval: function(paymentId) {
          addLog('Payment needs approval: ' + paymentId);
          Pi.approvePayment(paymentId);
        },
        onReadyForServerCompletion: function(paymentId, txid) {
          addLog('Payment SUCCESS! TX: ' + txid);
          alert('تم الدفع التجريبي بنجاح');
        },
        onCancel: function(paymentId) {
          addLog('Payment cancelled: ' + paymentId);
        },
        onError: function(error, payment) {
          addLog('Payment ERROR: ' + error.message);
          alert('فشل الدفع: ' + error.message);
        }
      });
    }
  </script>
</body>
</html>
