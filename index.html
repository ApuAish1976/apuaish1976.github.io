<!DOCTYPE html>
<html>
<head>
    <title>Cortex Escrow</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; background: #1a1a1a; color: white; }
        button { background: #7034FF; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 8px; cursor: pointer; }
        button:hover { background: #5a28cc; }
    </style>
</head>
<body>
    <h1>Cortex Escrow dApp</h1>
    <p>Secure Pi payments via smart contract</p>
    <p><code>0x853967d78d27c538714c01b5fd3b1cf06502d827</code></p>
    <button onclick="pay()">Test Payment 0.1 Test-Pi</button>
    <div id="status"></div>
    
    <script>
        Pi.init({ version: "2.0", sandbox: true });
        
        function pay() {
            document.getElementById('status').innerText = 'Processing...';
            
            const paymentData = {
                amount: 0.1,
                memo: "Cortex Goal Test Transaction",
                metadata: { 
                    app: "Cortex",
                    to_address: "0x853967d78d27c538714c01b5fd3b1cf06502d827" 
                }
            };
            
            Pi.createPayment(paymentData, {
                onReadyForServerApproval: (paymentId) => {
                    console.log("Approve:", paymentId);
                    document.getElementById('status').innerText = 'Payment approved: ' + paymentId;
                },
                onReadyForServerCompletion: (paymentId, txid) => {
                    console.log("Complete:", txid);
                    document.getElementById('status').innerText = 'Success! TX: ' + txid;
                },
                onCancel: (paymentId) => {
                    document.getElementById('status').innerText = 'Payment cancelled';
                },
                onError: (error, payment) => {
                    document.getElementById('status').innerText = 'Error: ' + error;
                },
            });
        }
    </script>
</body>
</html>
